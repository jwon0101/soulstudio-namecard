    .link-label {

      font-family: 'Noto Sans JP', sans-serif;

<script>
function downloadVCard() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:元 志喜',
    'N:元;志喜;;;',
    'ORG:SoulStudio',
    'TITLE:代表取締役CEO',
    'EMAIL;TYPE=WORK:won@soulstudio.jp',
    'URL;TYPE=WORK:https://soulstudio.jp/ja/',
    'URL;TYPE=pref:https://won.soulstudio.jp',
    'X-SOCIALPROFILE;TYPE=facebook:https://www.facebook.com/jiheeone',
    'X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/jiheeone/',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'won-jihee.vcf';
  a.click();
  URL.revokeObjectURL(url);
}
